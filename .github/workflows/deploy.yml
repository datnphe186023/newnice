name: Deploy Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Validate deploy secrets
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
        run: |
          test -n "$VPS_HOST" || (echo "Missing repository secret: VPS_HOST" && exit 1)
          test -n "$VPS_USER" || (echo "Missing repository secret: VPS_USER" && exit 1)
          test -n "$VPS_SSH_KEY" || (echo "Missing repository secret: VPS_SSH_KEY" && exit 1)
          echo "Deploy secrets are present."

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          script: |
            set -e
            cd /opt/autofilm-website
            git fetch --prune origin
            git checkout main
            git pull --ff-only origin main
            docker compose --env-file .env.prod -f docker-compose.prod.yml build
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
            docker image prune -f
            docker compose --env-file .env.prod -f docker-compose.prod.yml ps
