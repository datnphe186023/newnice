services:
  postgres:
    image: postgres:16.10-alpine3.22
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autofilm_prod}
      POSTGRES_USER: ${POSTGRES_USER:-autofilm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in environment}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autofilm} -d ${POSTGRES_DB:-autofilm_prod}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8000:8000"
    volumes:
      - backend_data:/app/data
      - backend_uploads:/app/uploads
    environment:
      DEBUG: ${DEBUG:-True}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in environment}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://autofilm:${POSTGRES_PASSWORD}@postgres:5432/autofilm_prod}
      SITE_URL: ${SITE_URL:?Set SITE_URL in environment}
      ADMIN_URL: ${ADMIN_URL:?Set ADMIN_URL in environment}
      CORS_ORIGINS: ${CORS_ORIGINS:?Set CORS_ORIGINS in environment}
      EMAIL_HOST: ${EMAIL_HOST:-}
      EMAIL_PORT: ${EMAIL_PORT:-587}
      EMAIL_USE_STARTTLS: ${EMAIL_USE_STARTTLS:-True}
      EMAIL_USERNAME: ${EMAIL_USERNAME:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@yourdomain.com}
      ADMIN_EMAIL: ${ADMIN_EMAIL:?Set ADMIN_EMAIL in environment}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    command: sh -c "alembic upgrade head && gunicorn -w ${WEB_CONCURRENCY:-1} -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 app.main:app"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:?Set NUXT_PUBLIC_API_BASE in environment}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:?Set NUXT_PUBLIC_SITE_URL in environment}
      NUXT_PUBLIC_GA_ID: ${NUXT_PUBLIC_GA_ID:-}
      NUXT_PUBLIC_GSC_VERIFICATION: ${NUXT_PUBLIC_GSC_VERIFICATION:-}
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000

volumes:
  backend_data:
  backend_uploads:
  postgres_data:
