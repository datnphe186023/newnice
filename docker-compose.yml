services:
  postgres:
    image: postgres:16.10-alpine3.22
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-autofilm}
      POSTGRES_USER: ${POSTGRES_USER:-autofilm}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autofilm}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autofilm} -d ${POSTGRES_DB:-autofilm}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_data:/app/data
    ports:
      - "8000:8000"
    environment:
      DEBUG: "False"
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY in environment}
      DATABASE_URL: ${DATABASE_URL:-postgresql+asyncpg://autofilm:autofilm@postgres:5432/autofilm}
      SITE_URL: ${SITE_URL:-http://localhost:3000}
      ADMIN_URL: ${ADMIN_URL:-http://localhost:3000}
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "3000:3000"
    environment:
      NUXT_PUBLIC_API_BASE: ${NUXT_PUBLIC_API_BASE:-http://localhost:8000/api/v1}
      NUXT_PUBLIC_SITE_URL: ${NUXT_PUBLIC_SITE_URL:-http://localhost:3000}
      NODE_ENV: production
      NITRO_HOST: 0.0.0.0
      NITRO_PORT: 3000
    command: sh -c "npm run build && node .output/server/index.mjs"

volumes:
  backend_data:
  postgres_data:
